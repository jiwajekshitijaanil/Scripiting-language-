<html>
<head>
    <title>Exception Handling</title>
</head>
<body>
<h2>Division using Exception Handling</h2>

Enter Numerator: <input type="text" id="num1"><br><br>
Enter Denominator: <input type="text" id="num2"><br><br>

<button onclick="divide()">Divide</button>

<p id="result"></p>

<script>
function divide() {
    try {
        var a = parseInt(document.getElementById("num1").value);
        var b = parseInt(document.getElementById("num2").value);

        if (b == 0) {
            throw "Denominator cannot be zero";
        }

        var c = a / b;
        document.getElementById("result").innerHTML = "Result = " + c;
    }
    catch(err) {
        document.getElementById("result").innerHTML = "Error: " + err;
    }
    finally {
        alert("Division operation completed");
    }
}
</script>

</body>
</html>
